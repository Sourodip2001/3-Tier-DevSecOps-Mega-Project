
name: CICD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compile:
    runs-on: Agent-1
    steps:
    - uses: actions/checkout@v4
    - name: Set Up NodeJs
      uses: actions/setup-node@v4
      with:
        node-version: '23'
    - name: Frontend Compilation
      run: |
        cd client
        find . -name "*.js" -exec node --check {} +
    - name: Backend Compilation
      run: |
        cd api
        find . -name "*.js" -exec node --check {} +
  gitleaks-scan:
    runs-on: Agent-1
    needs: compile
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Gitleaks setup
        uses: gitleaks/gitleaks-action@v2
      - name: Gitleaks 
        run: |
          gitleaks detect --source ./client --exit-code 1
          gitleaks detect --source ./api --exit-code 1
  trivy-scan:
    runs-on: Agent-1
    needs: 
      - compile
      - gitleaks-scan
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Run trivy scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
  sonarqube-scan:
    runs-on: Agent-1
    needs: 
      - trivy-scan
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Sonarqube scan client
        uses: sonarsource/sonarqube-scan-action@master
        with:
          projectBaseDir: client
          args: >
            -Dsonar.projectKey=myorg_client
            -Dsonar.projectName=myorg_client
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  sonarqube-scan-backend:
    runs-on: Agent-1
    needs: 
      - sonarqube-scan
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Sonarqube scan client
        uses: sonarsource/sonarqube-scan-action@master
        with:
          projectBaseDir: api
          args: >
            -Dsonar.projectKey=myorg_client
            -Dsonar.projectName=myorg_client
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  docker-backend:
    runs-on: ubuntu-22.04
    needs: sonarqube-scan-backend
    steps:
       - uses: actions/checkout@v4
       - name: Login to Docker Hub
         uses: docker/login-action@v4
         with:
           username: ${{ secrets.DOCKERHUB_USERNAME }}
           password: ${{ secrets.DOCKERHUB_TOKEN }}
       - name: Set up QEMU
         uses: docker/setup-qemu-action@v4
       - name: Set up Docker Buildx
         uses: docker/setup-buildx-action@v4
       - name: Build and push
         uses: docker/build-push-action@v7
         with:
           context: ./api
           push: true
           tags: sourodip290301/backend:latest
           file: ./api/Dockerfile
  docker-frontend:
    runs-on: ubuntu-22.04
    needs: docker-backend
    steps:
       - uses: actions/checkout@v4
       - name: Login to Docker Hub
         uses: docker/login-action@v4
         with:
           username: ${{ secrets.DOCKERHUB_USERNAME }}
           password: ${{ secrets.DOCKERHUB_TOKEN }}
       - name: Set up QEMU
         uses: docker/setup-qemu-action@v4
       - name: Set up Docker Buildx
         uses: docker/setup-buildx-action@v4
       - name: Build and push
         uses: docker/build-push-action@v7
         with:
           context: ./client
           push: true
           tags: sourodip290301/frontend:latest
           file: ./client/Dockerfile
  trivy-scan-docker-image:
    runs-on: Agent-1
    needs: 
      - docker-frontend
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Run trivy scanner for backend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: sourodip290301/backend:latest
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      - name: Run trivy scanner for frontend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: sourodip290301/frontend:latest
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
            
  
